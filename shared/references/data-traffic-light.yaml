green:
  description: 공개 가능 자료
  allowed:
    - 공개 행정자료
    - 공공데이터포털 개방 데이터
    - 샘플 또는 가명 테스트 데이터
yellow:
  description: 내부 업무자료 또는 개인정보 없는 이용자 입력자료
  requires:
    - 부서 책임자 확인
    - 행정망 한정 처리
  prompt_forbidden:
    - 원문 공문 전문
    - 내부 검토자료 전문
red:
  description: 개인정보, 민감정보, 비공개 행정정보
  action:
    - 외부 LLM 입력 금지
    - 실데이터 인터넷망 개발 금지
    - 가상 데이터 대체
    - 개인정보보호 협의 트리거
  patterns:
    - 주민등록번호
    - 전화번호
    - 계좌번호
    - name
    - phone
    - ssn
