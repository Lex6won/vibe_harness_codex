<!doctype html>
<html lang="ko">
<head><meta charset="utf-8"><title>파일 업로드</title></head>
<body>
  <main>
    <h1>파일 업로드</h1>
    <p>허용 형식: {{ allowed | join(", ") }}</p>
    <form action="/upload" method="post" enctype="multipart/form-data">
      <input type="file" name="file" required>
      <button type="submit">업로드</button>
    </form>
  </main>
</body>
</html>
